<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login – Sri Prasannanjaneya Home Needs</title>
    <meta name="description" content="Owner admin login for Sri Prasannanjaneya Home Needs management system.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin-login.css">
</head>
<body>

    <div class="login-bg">
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>
    </div>

    <div class="login-wrapper">
        <div class="login-card" id="loginCard">

            <!-- Logo / Brand -->
            <div class="login-header">
                <div class="brand-icon">
                    <i class="fas fa-store"></i>
                </div>
                <h1>Admin Portal</h1>
                <p>Sri Prasannanjaneya Home Needs</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" novalidate>

                <div class="form-group" id="usernameGroup">
                    <label for="username">
                        <i class="fas fa-user"></i>
                        Username
                    </label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        class="input-field"
                        placeholder="Enter username"
                        autocomplete="username"
                        required
                    >
                    <span class="field-error" id="usernameError"></span>
                </div>

                <div class="form-group" id="passwordGroup">
                    <label for="password">
                        <i class="fas fa-lock"></i>
                        Password
                    </label>
                    <div class="password-wrapper">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="input-field"
                            placeholder="Enter password"
                            autocomplete="current-password"
                            required
                        >
                        <button type="button" class="toggle-pass" id="togglePassword" aria-label="Toggle password visibility">
                            <i class="fas fa-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                    <span class="field-error" id="passwordError"></span>
                </div>

                <!-- Global Login Error -->
                <div class="login-error" id="loginError" style="display:none;">
                    <i class="fas fa-exclamation-triangle"></i>
                    Invalid Username or Password
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <span class="btn-text" id="loginBtnText">Sign In</span>
                    <span class="btn-spinner" id="loginSpinner"></span>
                </button>

            </form>

            <p class="login-footer">
                <i class="fas fa-shield-alt"></i>
                Authorized personnel only
            </p>

        </div>
    </div>

    <script src="js/admin-login.js"></script>

</body>
</html>
